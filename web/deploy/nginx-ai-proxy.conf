server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name cislunarspace.cn www.cislunarspace.cn;

    ssl_certificate /etc/ssl/certs/cislunarspace.cn_bundle.crt;
    ssl_certificate_key /etc/ssl/private/cislunarspace.cn.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /home/ubuntu/cislunarspace/web/.vuepress/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /api/ai/ {
        proxy_pass https://api.deepseek.com/;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;

        proxy_set_header Host api.deepseek.com;
        proxy_set_header Authorization "Bearer YOUR_DEEPSEEK_API_KEY_HERE";  # 替换为你的真实DeepSeek API密钥
        proxy_set_header Content-Type "application/json";

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        add_header Cache-Control "no-store";
        limit_except POST { deny all; }
    }

    # 添加JSON文件的缓存配置
    location ~* \.(json)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    server_tokens off;
}